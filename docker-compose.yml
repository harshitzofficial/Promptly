version: '3.8'

services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - DB_PATH=/usr/src/app/data/database.sqlite
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - prompt_shaper_data:/usr/src/app/data
    restart: unless-stopped

volumes:
  prompt_shaper_data:
